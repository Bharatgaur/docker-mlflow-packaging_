# ==============================================================
# Conda Environment
# Create with:  conda env create -f environment.yml
# Activate :    conda activate docker-mlflow-packaging
# ==============================================================

name: docker-mlflow-packaging

channels:
  - defaults
  - conda-forge

dependencies:
  - python=3.10
  - pip

  # Notebook
  - jupyter
  - ipykernel

  # pip-only packages
  - pip:
    - scikit-learn==1.4.2
    - numpy==1.26.4
    - pandas==2.2.1
    - mlflow==2.12.2
    - fastapi==0.111.0
    - uvicorn[standard]==0.29.0
    - pydantic==2.7.1
    - requests==2.31.0
